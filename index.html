<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>Tienda Xbox</title>
</head>
<body>
    <header>
        <i><img src="img/menu.png" alt="Icono Menu"></i>
        <img src="img/XboxLogo.png" alt="Icono Empresa">
        <i><img src="img/cart.png" alt="Icono Carrito"></i>
    </header>

    <main>
        <section class="banner">
            <h2>JUEGOS</h2>
            <p>Conoce nuestros lanzaminetos recientes</p>
        </section>

        <section class="products">
            <article>
                <img src="img/GearsOfWar.jpg" alt="Gears Of War">
                <h3>Gears Of War</h3>
                <p>$1,100.00</p>
            </article>

            <article>
                <img src="img/Halo.jpg" alt="Halo">
                <h3>Halo Infinite</h3>
                <p>$1,400.00</p>
            </article>

            <article>
                <img src="img/Forza.webp" alt="Forza">
                <h3>Forza Horizon 5</h3>
                <p>$1,400.00</p>
            </article>
        </section>

        <section class="cart">
            <h2>CARRITO</h2>
            <div>
                <img src="img/GearsOfWar.jpg" alt="Carrito">
                <p>Gears Of War</p>
                <p>$1,100.00</p>
                <i><img src="img/delete.png" alt="Icono Quitar" class="delete-icon"></i>
            </div>
        </section>
    </main>
    
</body>
</html>
